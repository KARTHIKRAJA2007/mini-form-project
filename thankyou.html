<!DOCTYPE html>
<html>
<head>
    <title>Thank You</title>
    <style>
        body{
            font-family: Arial;
            background:#f4f6f9;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }
        .box{
            background:white;
            padding:40px;
            border-radius:10px;
            text-align:center;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }
        a{
            display:inline-block;
            margin-top:20px;
            text-decoration:none;
            color:white;
            background:#4e73df;
            padding:10px 20px;
            border-radius:5px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Thank You {{ name }}! 🎉</h2>
    <p>Your details have been successfully submitted.</p>
    <a href="/">Submit Another Response</a>
</div>

</body>
</html>
